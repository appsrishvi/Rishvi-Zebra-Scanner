name: rishvi_zebra_scanner
description: A Flutter plugin for Zebra Technologies barcode scanner devices (TC-series, MC-series, EC-series). Uses the DataWedge API to deliver scan results via a reactive stream. Developed by Rishvi for use with Zebra Android hardware.
version: 1.0.1

homepage: https://rishvi.co.uk
repository: https://github.com/appsrishvi/Rishvi-Zebra-Scanner
issue_tracker: https://github.com/appsrishvi/Rishvi-Zebra-Scanner/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: uk.co.rishvi.zebra_scanner
        pluginClass: ZebraScannerPlugin
